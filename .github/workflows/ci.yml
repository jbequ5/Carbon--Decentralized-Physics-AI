name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dev deps
      run: pip install ruff black pytest
    - name: Lint
      run: ruff check .
    - name: Format check
      run: black --check .

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install
      run: pip install -e ".[dev]"
    - name: Run tests
      run: pytest tests/ -q --tb=no

