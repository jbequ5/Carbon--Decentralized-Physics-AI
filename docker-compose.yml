version: '3.8'

services:
  validator:
    build:
      context: .
      dockerfile: docker/validator/Dockerfile
    image: hydrogen-validator:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - .:/app
    command: python3 -m neurons.validator

  miner:
    build:
      context: .
      dockerfile: docker/miner/Dockerfile
    image: hydrogen-miner:latest
    volumes:
      - .:/app
    environment:
      - HYDROGEN_HOTKEY=${HYDROGEN_HOTKEY:-}
      - HYDROGEN_WALLET=${HYDROGEN_WALLET:-}
      - HYDROGEN_API_KEY=${HYDROGEN_API_KEY:-}
    # Default: run the example agentic miner
    # Override command to run your own agent
    command: python examples/run_agentic_miner.py

  # Example: Run a custom agent script
  # custom-agent:
  #   build:
  #     context: .
  #     dockerfile: docker/miner/Dockerfile
  #   volumes:
  #     - .:/app
  #     - ./my_custom_agent.py:/app/my_custom_agent.py
  #   command: python my_custom_agent.py
